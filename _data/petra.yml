letters:
  - date: March 3, 2026
    title: Za Petru
    greeting: Brijateljice,
    paragraphs:
      - Kaže Goethe "You can easily judge the character of a man by how he treats those who can do nothing for him". Učiniti nešto za nekoga i činiti nekome nešto su dvije različite stvari. Realno ti i ja smo sposobni činit stvari za druge, ali jedno drugom činimo stvari. Možda je ispravnije reći začinimo. Biti ono što jesmo, uključujući ono loše je dar koji poklanjamo jedno drugom.
      - Ja na tebe mislim češće nego ti misliš da mislim, a ja mislim da mislim mnogo. Mislim da i ti misliš. Mislim da samo misao nije misija. Nemoj mislit da je tako.
      - Neki ljudi svoje voljeno upucaju u koljeno, a ja svojoj slomijem nos. Nekad kažem nešto ružno. Rijetko bezobrazno. Nekad sam neobziran. Iako si me natovila svojom ljubavlju nemoj nikad mislit da si dovoljno bacala bisere pred svinje.
    closing: S ljubavlju,
    signature: Vernes 
  - date: March 8, 2026
    title: Sretan 8. Mart
    greeting: Kako nekome ko ne voli iznenađenja pokloniti nešto?
    paragraphs:
      - Ja ako tebe pitam želiš ti nešto ti ćeš reći da to ne radim. Morat ćemo poradit na tome. Jer ja volim kad ti meni daješ bilo šta. Neću ti nikad reći da prestaneš. I ti voliš dati, ali oboje ne idemo iz mjesta transakcije. Pa i da jeste nekad, neka je. Ja se nadam da će ti Zagreb dati ono što si tražila zadnjih nekoliko sedmica. A sigurno ti neće dati ljubav koju ti ja sad šaljem.
      - Mehanička tastatura, mehanički razmišljam i pišem <br> Inžinjer u duši drugačije ne znam da dišem <br> I pišem. Ne samo da bih te mazio <br> Nego kalkulisano, da bih odnos pazio <br><br> I precizno slažem rime <br> Iako se ti ne slažeš s time <br> Ne mora svaki stih biti metafora <br> Može biti i po koja meta fora <br><br> Ja želim da budem kraj tebe, <br> ali ne želim da to bude krâj mene, <br> sjaj tebe, sjaj nas. Neću zanemarit<br><br>Ljudi pitaju gdje ti je Petra, a samo me ti pitaš gdje mi srce? <br>  
    signature: Brijatelj
  - date: April 25, 2026
    title: Poklon
    greeting: Plesaču,
    paragraphs:
      - Plesaču, pisaču! Sada pisat ću. Ali ako bolje razmislimo, pisanje je plesanje, prstima. Možda zato ti i voliš toliko pisat. Tako da je bolje reći plesaču, pisaču, sada pisat ću sada plesat ću. 
      - Jesi li čula ikad za kontrastno sredstvo? Ono se koristi u radiologiji kako bi se stvorio kontrast na organu koji se slika u odnosu na ostatak tijela koji nije bitan za sliku. Ja sam shvatio da si ti meni kontrastno sredstvo za ljude. Više za žene, ali i za ponekog lika. Ljudi se stvarno ne trude kad su drugi ljudi u pitanju. Izumire i ona majka što više brine o svakome osim o sebi. I treba treba da umre, ali kad se to desi znamo na čemu smo. A sign of the times. Kolektivna apatija. Srećom ja učim, a ti me učiš da brže učim, pa se migoljim.
      - Ovih dana mi je tako lijepo i osjetim neki progres iako se u stvari ništa značajno ne događa. Taj progres nije ona vrsta kanceregog rasta, nego progres u smislu smisla života. I am living and loving. Broadly and deeply. Osjećam se sve slobodnije i prijateljstva usmjeravam tamo gdje želim da idu a ne radim ništa aktivno. To ćeš mi ti sigurno pomoć izanalizirat. Vidimo se uskoro
    signature: Brijatelj
